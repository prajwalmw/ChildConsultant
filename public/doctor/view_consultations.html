    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCyLCI_GOl9SWDLo2zhjMthLQFZ5sA3ddM",

        const auth = firebase.auth();

        let currentPatientId = null;
        let currentParentId = null; 
        let currentPatientName = 'Loading...';
        let currentParentName = 'Loading...';
        let parentKey = null;

        function getQueryVariable(variable) {
            const query = window.location.search.substring(1);
            const vars = query.split("&");
            for (let i = 0; i < vars.length; i++) {
                const pair = vars[i].split("=");
                if (pair[0] == variable) {
                    return pair[1];
                }
            }
            return (false);
        }

        // Helper function to sanitize name for use in a document ID
        function slugifyName(text) {
            return text.toLowerCase()
                .trim()
                .replace(/[^a-z0-9\s-]/g, '') 
                .replace(/\s+/g, '-')       
                .replace(/-+/g, '-');      
        }
        
        // Create the unique, traceable Parent document key
        function createParentKey(parentName, parentId) {
            const nameSlug = slugifyName(parentName || 'unknown-parent');
            return `${nameSlug}_${parentId}`;
        }
        
        function formatFirestoreTimestamp(timestamp) {
            if (!timestamp || !timestamp.toDate) return 'N/A';
            return timestamp.toDate().toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric'
            });
        }

        function esc(s) {
            if (s == null || s === undefined) return '';
            const d = document.createElement('div');
            d.textContent = String(s);
            return d.innerHTML;
        }

        function fmtDate(v) {
            if (!v) return 'N/A';
            try {
                const d = v.toDate ? v.toDate() : new Date(v);
                if (isNaN(d.getTime())) return 'N/A';
                return d.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
            } catch (e) { return 'N/A'; }
        }

        /**
         * Temperature bands use the same traffic-light sequence as child_dashboard motor getScoreColor:
         * green (#4caf50) → blue (#2196f3) → yellow (#ffc107) → red (#f44336). Informational only.
         */
        function classifyTemperature(raw) {
            if (raw == null || raw === '') return { cls: 'missing', tip: '' };
            const s0 = String(raw).trim();
            if (!s0 || /^n\/?a$/i.test(s0)) return { cls: 'missing', tip: '' };
            const lower = s0.toLowerCase();
            const num = parseFloat(s0.replace(/[^\d.\-]/g, ''));
            if (Number.isNaN(num)) return { cls: 'unknown', tip: 'Could not parse value' };

            let celsius = num;
            const looksF = /\bf\b|\bff\b|fahrenheit/i.test(lower) || (num >= 94 && num <= 108 && !/\bc\b|celsius|centigrade/i.test(lower));
            if (looksF && num >= 94) celsius = (num - 32) * (5 / 9);
            else if (num >= 94 && num <= 108 && !/\bc\b|celsius/i.test(lower)) celsius = (num - 32) * (5 / 9);

            if (celsius < 35.0) return { cls: 'low', tip: 'Below typical — confirm with clinician if concerned' };
            if (celsius < 36.0) return { cls: 'caution', tip: 'On the low side — context matters' };
            if (celsius <= 37.5) return { cls: 'normal', tip: 'Typical non-fever range (informational)' };
            if (celsius <= 38.0) return { cls: 'caution', tip: 'Low-grade fever range' };
            return { cls: 'alert', tip: 'Fever range — follow your doctor’s advice' };
        }

        function formatTemperatureNumberForDisplay(num) {
            if (Number.isNaN(num)) return '';
            const rounded = Math.round(num * 10) / 10;
            if (Math.abs(rounded - Math.round(rounded)) < 1e-9) return String(Math.round(rounded));
            return rounded.toFixed(1).replace(/\.0$/, '');
        }

        /** Human-readable value with unit; bands in classifyTemperature still use °C internally. */
        function temperatureDisplayWithUnit(raw) {
            const s0 = String(raw != null ? raw : '').trim();
            if (!s0 || /^n\/?a$/i.test(s0)) return null;
            const lower = s0.toLowerCase();
            const num = parseFloat(s0.replace(/[^\d.\-]/g, ''));
            if (Number.isNaN(num)) return null;
            const hasC = /\bc\b|celsius|centigrade|°\s*c|℃/i.test(lower) ||
                /^\s*\d+(?:\.\d+)?\s*c\s*$/i.test(s0);
            const hasF = /\bf\b|fahrenheit|°\s*f|℉/i.test(lower) ||
                /^\s*\d+(?:\.\d+)?\s*f\s*$/i.test(s0);
            var useF;
            if (hasF) useF = true;
            else if (hasC) useF = false;
            else if (num >= 90 && num <= 110) useF = true;
            else useF = false;
            return formatTemperatureNumberForDisplay(num) + (useF ? '\u00a0°F' : '\u00a0°C');
        }

        function formatTemperaturePill(temp) {
            const raw = temp != null && String(temp).trim() ? String(temp) : '';
            if (!raw) return '<span class="vital-pill vital-missing">N/A</span>';
            const cat = classifyTemperature(temp);
            const tip = cat.tip ? ' title="' + esc(cat.tip) + '"' : '';
            const labeled = temperatureDisplayWithUnit(raw);
            const disp = labeled != null ? labeled : raw;
            return '<span class="vital-pill vital-' + esc(cat.cls) + '"' + tip + '>' + esc(disp) + '</span>';
        }

        function formatNumericVitalPill(val, unit) {
            if (val == null || val === '' || (typeof val === 'number' && Number.isNaN(val))) {
                return '<span class="vital-pill vital-missing">N/A</span>';
            }
            return '<span class="vital-pill vital-recorded" title="Recorded at this visit">' +
                esc(String(val)) + (unit ? ' ' + esc(unit) : '') + '</span>';
        }

        function classifySymptomDuration(raw) {
            if (raw == null || raw === '') return { cls: 'missing', tip: '' };
            const s = String(raw).trim();
            if (!s || /^n\/?a$/i.test(s)) return { cls: 'missing', tip: '' };
            const m = s.match(/(\d+(?:\.\d+)?)/);
            if (!m) return { cls: 'unknown', tip: '' };
            let days = parseFloat(m[1]);
            if (/week/i.test(s)) days *= 7;
            else if (/month/i.test(s)) days *= 30;
            else if (/year/i.test(s)) days *= 365;
            /* Bands mirror dashboard score tiers: green → yellow → orange → red */
            if (days > 21) return { cls: 'alert', tip: 'Long-standing symptoms — ensure follow-up' };
            if (days > 14) return { cls: 'warning', tip: 'Over two weeks — clinical review suggested' };
            if (days > 7) return { cls: 'caution', tip: 'More than one week' };
            return { cls: 'normal', tip: 'Duration noted' };
        }

        function formatSymptomDurationPill(symDur) {
            const raw = symDur != null && String(symDur).trim() ? String(symDur) : '';
            const disp = raw ? esc(raw) : 'N/A';
            const cat = classifySymptomDuration(symDur);
            const tip = cat.tip ? ' title="' + esc(cat.tip) + '"' : '';
            return '<span class="vital-pill vital-' + esc(cat.cls) + '"' + tip + '>' + disp + '</span>';
        }

        function formatPrescriptionIssuedPill(v) {
            if (v === true) {
                return '<span class="vital-pill vital-recorded" title="Prescription / medicines issued at this visit">Yes</span>';
            }
            if (v === false) {
                return '<span class="vital-pill vital-missing" title="No prescription issued">No</span>';
            }
            return '<span class="vital-pill vital-missing">N/A</span>';
        }

        function formatFollowUpRequiredPill(v) {
            if (v === true) {
                return '<span class="vital-pill vital-caution" title="Follow-up visit recommended">Yes</span>';
            }
            if (v === false) {
                return '<span class="vital-pill vital-normal" title="No follow-up requested">No</span>';
            }
            return '<span class="vital-pill vital-missing">N/A</span>';
        }

        function formatNextFollowUpPill(c) {
            const d = c.nextFollowUpDate;
            const txt = fmtDate(d);
            if (!d || txt === 'N/A') return '<span class="vital-pill vital-missing">N/A</span>';
            try {
                const dt = d.toDate ? d.toDate() : new Date(d);
                if (isNaN(dt.getTime())) return '<span class="vital-pill vital-missing">N/A</span>';
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const cmp = new Date(dt);
                cmp.setHours(0, 0, 0, 0);
                /* Past = concern red (#f44336); today = monitor yellow; future = good blue (#2196f3) — dashboard motor tiers */
                if (cmp < today) return '<span class="vital-pill vital-alert" title="Date is in the past — confirm in records">' + esc(txt) + '</span>';
                if (cmp.getTime() === today.getTime()) return '<span class="vital-pill vital-caution" title="Due today">' + esc(txt) + '</span>';
                return '<span class="vital-pill vital-low" title="Scheduled follow-up">' + esc(txt) + '</span>';
            } catch (e) {
                return '<span class="vital-pill vital-missing">' + esc(txt) + '</span>';
            }
        }

        function formatVisitTypePill(typeStr) {
            const t = (typeStr || 'N/A').trim();
            const low = t.toLowerCase();
            let cls = 'visit-type-default';
            if (/follow/.test(low)) cls = 'visit-type-followup';
            else if (/initial|first\s*visit/.test(low)) cls = 'visit-type-initial';
            else if (/routine|check/.test(low)) cls = 'visit-type-routine';
            return '<span class="visit-type-pill ' + cls + '">' + esc(t) + '</span>';
        }

        function shortenDoctorId(id) {
            const s = String(id || '');
            if (!s) return '';
            return s.length > 14 ? s.slice(0, 8) + '…' + s.slice(-4) : s;
        }

        /** child_dashboard motor getScoreColor thresholds (0–10). */
        function motorScoreTier(score) {
            const s = Number(score);
            if (Number.isNaN(s)) return 'missing';
            if (s >= 9) return 'normal';
            if (s >= 7.5) return 'low';
            if (s >= 6) return 'caution';
            if (s >= 4) return 'warning';
            return 'alert';
        }

        /** child_dashboard cognitive Bayley-style 0–130 bands. */
        function cognitiveScoreTier(score) {
            const s = Number(score);
            if (Number.isNaN(s)) return 'missing';
            if (s >= 116) return 'normal';
            if (s >= 100) return 'low';
            if (s >= 85) return 'caution';
            if (s >= 70) return 'warning';
            return 'alert';
        }

        /** child_dashboard SISA-style 0–100 bands. */
        function socialScoreTier(score) {
            const s = Number(score);
            if (Number.isNaN(s)) return 'missing';
            if (s >= 85) return 'normal';
            if (s >= 70) return 'low';
            if (s >= 40) return 'caution';
            if (s >= 16) return 'warning';
            return 'alert';
        }

        /** Map category label text to same vital-* tiers as dashboard wording. */
        function categoryTierFromLabel(cat) {
            const t = String(cat || '').toLowerCase().trim();
            if (!t) return 'missing';
            if (/excellent|superior|very\s*good|above\s*typical/i.test(t)) return 'normal';
            if (/good|above\s*average|high(\s|$)|strong/i.test(t)) return 'low';
            if (/average|adequate|typical|mid|moderate/i.test(t)) return 'caution';
            if (/below\s*average|mild|borderline/i.test(t)) return 'warning';
            if (/concern|delay|significant|poor|low(\s|$)|intervention|evaluation|needed/i.test(t)) return 'alert';
            return 'unknown';
        }

        /**
         * Score text for prescription pills (value / scale max).
         * Motor 0–10, CDI cognitive 0–130, SISA & nutritional overall 0–100 (same tiers as dashboard).
         */
        function formatScoreValueOverMax(s, maxOutOf) {
            const max = Number(maxOutOf);
            if (!Number.isFinite(max) || max <= 0) return String(s);
            if (max <= 10) {
                var v10 = Math.round(s * 100) / 100;
                var t10 = (Math.abs(v10 - Math.round(v10)) < 1e-9) ? String(Math.round(v10)) : v10.toFixed(2).replace(/\.?0+$/, '');
                return t10 + '/' + max;
            }
            if (max >= 130) {
                return String(Math.round(s)) + '/' + max;
            }
            var v100 = Math.round(s * 100) / 100;
            var t100 = (Math.abs(v100 - Math.round(v100)) < 1e-9) ? String(Math.round(v100)) : String(v100);
            return t100 + '/' + max;
        }

        /**
         * Flat row: label | Score value/max · status (tier = left accent only; no nested boxes).
         */
        function formatPrescriptionScreeningRow(label, score, tierFn, maxOutOf, category) {
            const rawCat = category != null ? String(category).trim() : '';
            const sNum = Number(score);
            const hasScore = score != null && score !== '' && !Number.isNaN(sNum);
            var scoreTier = hasScore ? tierFn(sNum) : 'missing';
            var scoreLabel = '—';
            if (hasScore) {
                scoreLabel = (maxOutOf != null && Number.isFinite(Number(maxOutOf)))
                    ? formatScoreValueOverMax(sNum, maxOutOf)
                    : String(sNum);
            }
            var catTier = rawCat ? categoryTierFromLabel(rawCat) : 'missing';
            var barTier = hasScore ? scoreTier : (rawCat ? (catTier === 'unknown' ? 'recorded' : catTier) : 'missing');
            var catHtml = rawCat ? esc(rawCat) : esc('—');
            return (
                '<div class="prescription-dev-row prescription-dev-row--' + esc(barTier) + '" role="group" aria-label="' + esc(label) + '">' +
                '<div class="prescription-dev-label">' + esc(label) + '</div>' +
                '<div class="prescription-dev-main">' +
                '<span class="prescription-dev-muted">Score</span>' +
                '<span class="prescription-dev-val">' + esc(scoreLabel) + '</span>' +
                '<span class="prescription-dev-sep" aria-hidden="true">·</span>' +
                '<span class="prescription-dev-status-text">' + catHtml + '</span>' +
                '</div></div>'
            );
        }

        /** 0–100 nutritional overall score → same vital-* pill tiers as dashboard coloring. */
        function nutritionalOverallTier(score) {
            const s = Number(score);
            if (Number.isNaN(s)) return 'missing';
            if (s >= 85) return 'normal';
            if (s >= 70) return 'low';
            if (s >= 55) return 'caution';
            if (s >= 40) return 'warning';
            return 'alert';
        }

        function hasNutritionalScreeningFields(n) {
            if (!n || typeof n !== 'object') return false;
            return !!(n.energyLevel || n.appetite || n.skinHealth || n.hairQuality || n.nailHealth ||
                n.mealsPerDay != null || n.breakfastRegularity || n.junkFoodFrequency ||
                (n.fruitServings !== null && n.fruitServings !== undefined) ||
                (n.vegetableServings !== null && n.vegetableServings !== undefined) ||
                (n.dairyIntake !== null && n.dairyIntake !== undefined) ||
                (n.supplements && n.supplements.length));
        }

        function formatDoctorDisplayName(name) {
            const n = (name || '').trim();
            if (!n) return 'Referring physician';
            if (/^dr\.?\s/i.test(n)) return n;
            return 'Dr. ' + n;
        }

        function soapOrEmpty(t) {
            const s = t && String(t).trim();
            return s ? esc(s) : '<em class="text-muted">Not recorded</em>';
        }

        /**
         * Doctor display: users/{uid} (portal account) then, if needed, doctors/ by exact name
         * (marketing profile has qualification + title/speciality).
         */
        async function fetchDoctorDetails(doctorUid, consultDoctorName) {
            const out = {
                preferredName: (consultDoctorName || '').trim(),
                qualification: '',
                speciality: ''
            };
            if (doctorUid && typeof doctorUid === 'string') {
                try {
                    const du = await db.collection('users').doc(doctorUid).get();
                    if (du.exists) {
                        const ud = du.data() || {};
                        const un = (ud.name || ud.displayName || '').trim();
                        if (un) out.preferredName = un;
                        out.qualification = (ud.qualification || ud.degree || '').trim();
                        out.speciality = (ud.specialization || ud.specialty || ud.speciality || ud.title || '').trim();
                    }
                } catch (err) { /* ignore */ }
            }
            const tryMatch = (out.preferredName || '').trim();
            if (tryMatch && (!out.qualification || !out.speciality)) {
                const variants = [tryMatch, tryMatch.replace(/^dr\.?\s+/i, '').trim()].filter(function (v, i, a) {
                    return v && a.indexOf(v) === i;
                });
                for (let vi = 0; vi < variants.length; vi++) {
                    const t = variants[vi];
                    if (!t) continue;
                    try {
                        const qs = await db.collection('doctors').where('name', '==', t).limit(1).get();
                        if (!qs.empty) {
                            const dd = qs.docs[0].data() || {};
                            if (!out.qualification) out.qualification = (dd.qualification || '').trim();
                            if (!out.speciality) out.speciality = (dd.title || '').trim();
                            break;
                        }
                    } catch (err) { /* query / index */ }
                }
            }
            return out;
        }

        function buildPrescriptionHTML(c, consultId, doctorExtra, childProfile) {
            doctorExtra = doctorExtra || {};
            childProfile = childProfile || {};
            const soap = c.soapNotes || {};
            const subj = c.subjective != null ? c.subjective : soap.subjective;
            const obj = c.objective != null ? c.objective : soap.objective;
            const assess = c.assessment != null ? c.assessment : soap.assessment;
            const plan = c.plan != null ? c.plan : soap.plan;

            const w = c.weight != null ? c.weight : (c.physicalHealth && c.physicalHealth.weight != null ? c.physicalHealth.weight : null);
            const h = c.height != null ? c.height : (c.physicalHealth && c.physicalHealth.height != null ? c.physicalHealth.height : null);
            const temp = c.temperature || (c.physicalHealth && c.physicalHealth.temperature) || null;
            const symDur = c.symptomDuration || (c.physicalHealth && c.physicalHealth.symptomDuration) || null;

            let devBlocks = '';
            if (c.motorSkills && (c.motorSkills.overallScore != null || c.motorSkills.category)) {
                devBlocks += formatPrescriptionScreeningRow('Motor skills', c.motorSkills.overallScore, motorScoreTier, 10, c.motorSkills.category);
            }
            if (c.cognitiveHealth && (c.cognitiveHealth.overallScore != null || c.cognitiveHealth.category)) {
                devBlocks += formatPrescriptionScreeningRow('Cognitive (CDI)', c.cognitiveHealth.overallScore, cognitiveScoreTier, 130, c.cognitiveHealth.category);
            }
            if (c.socialSkills && (c.socialSkills.overallScore != null || c.socialSkills.category)) {
                devBlocks += formatPrescriptionScreeningRow('Social (SISA)', c.socialSkills.overallScore, socialScoreTier, 100, c.socialSkills.category);
            }
            if (hasNutritionalScreeningFields(c.nutritionalHealth) &&
                typeof window.calculateNutritionalScoresPrescription === 'function' &&
                typeof window.getNutritionalScoreCategoryPrescription === 'function') {
                const nScores = window.calculateNutritionalScoresPrescription(
                    c.nutritionalHealth, childProfile, c.date || c.consultationDate);
                const nutOverall = nScores.overall;
                const nutCat = window.getNutritionalScoreCategoryPrescription(nutOverall);
                if (nutCat) {
                    devBlocks += formatPrescriptionScreeningRow('Nutritional health', nutOverall, nutritionalOverallTier, 100, nutCat);
                }
            }

            const dName = formatDoctorDisplayName(doctorExtra.preferredName || c.doctorName);
            const dQual = (doctorExtra.qualification || '').trim() ? esc(doctorExtra.qualification.trim()) : '—';
            const dSpec = (doctorExtra.speciality || '').trim() ? esc(doctorExtra.speciality.trim()) : '—';

            const devSection = devBlocks
                ? `<div class="prescription-section"><h3>Development &amp; screening notes</h3><div class="prescription-dev-list">${devBlocks}</div></div>`
                : '';

            return (
                '<div class="prescription-content-layer">' +
                '<div class="prescription-watermark" aria-hidden="true"></div>' +
                '<div class="prescription-brand-strip">' +
                '<img src="../images/logo.png" alt="Aqiraa" width="52" height="52">' +
                '<div><div class="prescription-brand-name">Aqiraa</div>' +
                '<div class="prescription-brand-tag">Pediatric consultation record</div></div></div>' +
                '<div class="prescription-rx-badge">Rx</div>' +
                '<p class="prescription-lead text-muted">This sheet summarizes the visit for your records. Keep it with your child\'s health file. Call your doctor or emergency services if your child\'s condition worsens.</p>' +
                '<div class="prescription-section"><h3>Patient &amp; visit</h3>' +
                `<div class="prescription-kv"><strong>Child</strong> ${esc(currentPatientName)}</div>` +
                `<div class="prescription-kv"><strong>Parent / guardian</strong> ${esc(currentParentName)}</div>` +
                `<div class="prescription-kv"><strong>Visit date</strong> ${esc(fmtDate(c.date || c.consultationDate))}</div>` +
                `<div class="prescription-kv"><strong>Visit type</strong> ${formatVisitTypePill(c.type)}</div>` +
                `<div class="prescription-kv"><strong>Consultation reference</strong> ${esc(consultId)}</div>` +
                '<p class="text-muted prescription-ref-note">This is Aqiraa&rsquo;s internal reference for this visit (not a government medical registration number).</p>' +
                '</div>' +
                '<div class="prescription-section"><h3>Vitals &amp; basics</h3>' +
                `<div class="prescription-kv"><strong>Weight</strong> ${formatNumericVitalPill(w, 'kg')}</div>` +
                `<div class="prescription-kv"><strong>Height</strong> ${formatNumericVitalPill(h, 'cm')}</div>` +
                `<div class="prescription-kv"><strong>Temperature</strong> ${formatTemperaturePill(temp)}</div>` +
                `<div class="prescription-kv"><strong>Symptom duration</strong> ${formatSymptomDurationPill(symDur)}</div>` +
                '</div>' +
                '<div class="prescription-section"><h3>Diagnosis / clinical impression</h3>' +
                `<div class="prescription-block prescription-assessment">${soapOrEmpty(assess)}</div></div>` +
                '<div class="prescription-section"><h3>What you reported (subjective)</h3>' +
                `<div class="prescription-block">${soapOrEmpty(subj)}</div></div>` +
                '<div class="prescription-section"><h3>Exam &amp; findings (objective)</h3>' +
                `<div class="prescription-block">${soapOrEmpty(obj)}</div></div>` +
                '<div class="prescription-section"><h3>Plan &amp; advice</h3>' +
                `<div class="prescription-block">${soapOrEmpty(plan)}</div></div>` +
                '<div class="prescription-section"><h3>Medicines &amp; follow-up</h3>' +
                '<div class="prescription-kv"><strong>Prescription issued</strong> ' + formatPrescriptionIssuedPill(c.prescriptionGiven) + '</div>' +
                '<div class="prescription-kv"><strong>Follow-up visit needed</strong> ' + formatFollowUpRequiredPill(c.followUpRequired) + '</div>' +
                '<div class="prescription-kv"><strong>Next follow-up date</strong> ' + formatNextFollowUpPill(c) + '</div>' +
                '</div>' +
                devSection +
                '<div class="prescription-footer">' +
                '<div class="prescription-doctor-card">' +
                '<h3>Doctor details</h3>' +
                `<div class="prescription-kv"><strong>Name</strong> ${esc(dName)}</div>` +
                `<div class="prescription-kv"><strong>Qualification</strong> ${dQual}</div>` +
                `<div class="prescription-kv"><strong>Speciality</strong> ${dSpec}</div>` +
                '<div class="sig-line"></div>' +
                '<p class="text-muted prescription-ref-note" style="margin:8px 0 0;">Treating physician — Aqiraa consultation record</p>' +
                '</div></div></div>'
            );
        }

        function closePrescriptionModal() {
            const overlay = document.getElementById('prescription-modal-overlay');
            if (!overlay) return;
            overlay.classList.remove('is-open');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        async function openPrescriptionModal(consultId) {
            const overlay = document.getElementById('prescription-modal-overlay');
            const inner = document.getElementById('prescription-modal-inner');
            const sub = document.getElementById('prescription-modal-subtitle');
            if (!overlay || !inner || !parentKey || !currentPatientId) return;

            overlay.classList.add('is-open');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            sub.textContent = currentPatientName + ' — loading…';
            inner.innerHTML = '<div class="prescription-loading"><i class="fa fa-spinner fa-spin"></i> Loading consultation…</div>';

            try {
                const consultRef = db.collection('patients').doc(parentKey)
                    .collection('children').doc(currentPatientId)
                    .collection('consultations').doc(consultId);
                const snap = await consultRef.get();
                if (!snap.exists) {
                    inner.innerHTML = '<p class="text-danger text-center" style="padding:24px;">This consultation could not be found.</p>';
                    return;
                }
                const c = snap.data();
                sub.textContent = currentPatientName + ' · Visit: ' + fmtDate(c.date || c.consultationDate);

                const doctorExtra = await fetchDoctorDetails(c.doctorId, c.doctorName);
                let childProfile = {};
                try {
                    const chSnap = await db.collection('patients').doc(parentKey)
                        .collection('children').doc(currentPatientId).get();
                    if (chSnap.exists) childProfile = chSnap.data() || {};
                } catch (err) { /* ignore */ }
                inner.innerHTML = buildPrescriptionHTML(c, consultId, doctorExtra, childProfile);
            } catch (e) {
                console.error(e);
                inner.innerHTML = '<p class="text-danger text-center" style="padding:24px;">Error loading consultation.</p>';
            }
        }

        function setupPrescriptionModal() {
            const overlay = document.getElementById('prescription-modal-overlay');
            if (!overlay) return;
            const pastBody = document.getElementById('past-consultations-body');
            const upBody = document.getElementById('upcoming-followups-body');
            pastBody.addEventListener('click', handleConsultButtonClick);
            upBody.addEventListener('click', handleConsultButtonClick);
            overlay.addEventListener('click', function (e) {
                if (e.target === overlay) closePrescriptionModal();
            });
            const closeBtn = overlay.querySelector('.prescription-close-x');
            if (closeBtn) closeBtn.addEventListener('click', closePrescriptionModal);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && overlay.classList.contains('is-open')) {
                    closePrescriptionModal();
                }
            });
        }

        function handleConsultButtonClick(e) {
            const btn = e.target.closest('button[data-consult-id]');
            if (!btn) return;
            e.preventDefault();
            const raw = btn.getAttribute('data-consult-id');
            const id = raw ? decodeURIComponent(raw) : '';
            if (id) openPrescriptionModal(id);
        }
        
        function getPatientDetails() {
            currentPatientId = getQueryVariable('patientId');
            currentParentId = getQueryVariable('parentId');
            const rawPatientName = getQueryVariable('patientName');
            try {
                currentPatientName = rawPatientName
                    ? decodeURIComponent(String(rawPatientName).replace(/\+/g, ' '))
                    : 'Unknown Patient';
            } catch (e) {
                currentPatientName = rawPatientName ? String(rawPatientName) : 'Unknown Patient';
            }

            if (!currentPatientId || !currentParentId) {
                alert('Error: Patient ID or Parent ID not provided.');
                window.location.href = 'doctor_portal.html';
                return;
            }

            // Set up back link and initial patient info
            const backLink = document.getElementById('back-to-child-selection');
            if(backLink) backLink.href = 'doctor_portal.html';

            document.getElementById('patient-name-display').textContent = currentPatientName;
            document.getElementById('patient-id-display').textContent = currentPatientId;
            
            fetchParentNameAndConsultations();
        }

        async function fetchParentNameAndConsultations() {
            try {
                const parentDoc = await db.collection('users').doc(currentParentId).get();
                if (parentDoc.exists) {
                    const data = parentDoc.data();
                    currentParentName = data.name || data.displayName || `ID: ${currentParentId}`;
                } else {
                    currentParentName = `Parent Not Found (ID: ${currentParentId})`;
                }
                document.getElementById('parent-name-display-info').textContent = currentParentName;

                parentKey = createParentKey(currentParentName, currentParentId);

                const qpPatientName = getQueryVariable('patientName');
                const nameMissing = qpPatientName === false || !String(qpPatientName || '').trim();
                if (nameMissing || currentPatientName === 'Unknown Patient') {
                    try {
                        const childSnap = await db.collection('patients').doc(parentKey)
                            .collection('children').doc(currentPatientId).get();
                        if (childSnap.exists) {
                            const nm = (childSnap.data().name || '').trim();
                            if (nm) {
                                currentPatientName = nm;
                                const nameEl = document.getElementById('patient-name-display');
                                if (nameEl) nameEl.textContent = currentPatientName;
                            }
                        }
                    } catch (e) {
                        console.warn('Could not load child name from records', e);
                    }
                }

                fetchConsultations();

            } catch (error) {
                console.error("Error fetching parent name:", error);
                document.getElementById('parent-name-display-info').textContent = 'Error Loading Parent';
                document.getElementById('past-consultations-body').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error initializing data.</td></tr>';
            }
        }

        function fetchConsultations() {
            const pastTableBody = document.getElementById('past-consultations-body');
            const upcomingTableBody = document.getElementById('upcoming-followups-body');
            pastTableBody.innerHTML = '<tr><td colspan="5" class="text-center"><i class="fa fa-spinner fa-spin"></i> Loading Records...</td></tr>';
            upcomingTableBody.innerHTML = '<tr><td colspan="3" class="text-center"><i class="fa fa-spinner fa-spin"></i> Loading follow-ups...</td></tr>';

            const today = new Date();
            today.setHours(0, 0, 0, 0); // Normalize time to midnight

            db.collection('patients').doc(parentKey)
              .collection('children').doc(currentPatientId)
              .collection('consultations')
              .orderBy('date', 'desc') // Order by consultation date
              .get()
              .then(snapshot => {
                  pastTableBody.innerHTML = '';
                  upcomingTableBody.innerHTML = '';
                  let pastConsultsCount = 0;
                  let upcomingFollowupsCount = 0;
                  const consultFormBase = 'patient_consultation.html?parentId=' + encodeURIComponent(currentParentId)
                      + '&patientId=' + encodeURIComponent(currentPatientId)
                      + '&patientName=' + encodeURIComponent(currentPatientName);

                  snapshot.forEach(doc => {
                      const consult = doc.data();
                      const consultId = doc.id;
                      
                      // Check for Past Consultations (based on consultation date)
                      const consultDate = consult.date ? consult.date.toDate() : new Date(0);
                      const consultDateDisplay = formatFirestoreTimestamp(consult.date);
                      const typeHtml = formatVisitTypePill(consult.type || 'N/A');
                      const diagPlain = consult.assessment && String(consult.assessment).trim();
                      const diagHtml = diagPlain
                          ? '<span class="diag-cell diag-has">' + esc(String(consult.assessment).substring(0, 70)) + (String(consult.assessment).length > 70 ? '&hellip;' : '') + '</span>'
                          : '<span class="diag-cell diag-empty">N/A</span>';
                      const docHtml = consult.doctorName
                          ? '<span class="doctor-cell-name">' + esc(consult.doctorName) + '</span>'
                          : '<span class="doctor-cell-id" title="Doctor account reference">' + esc(shortenDoctorId(consult.doctorId) || '—') + '</span>';

                      const row = `
                          <tr>
                              <td>${consultDateDisplay}</td>
                              <td>${typeHtml}</td>
                              <td>${diagHtml}</td>
                              <td>${docHtml}</td>
                              <td class="td-actions">
                                  <button type="button" class="btn btn-view-details" data-consult-id="${encodeURIComponent(consultId)}">View details</button>
                              </td>
                          </tr>
                      `;

                      // Add to Past Consultations table
                      pastTableBody.innerHTML += row;
                      pastConsultsCount++;

                      // Check for Upcoming Follow-ups
                      const followUpDate = consult.nextFollowUpDate ? consult.nextFollowUpDate.toDate() : null;

                      if (consult.followUpRequired && followUpDate && followUpDate > today) {
                          const upTypeHtml = formatVisitTypePill(consult.type || 'N/A');
                          const followUpRow = `
                              <tr>
                                  <td class="date-upcoming">${formatFirestoreTimestamp(consult.nextFollowUpDate)}</td>
                                  <td>${upTypeHtml}</td>
                                  <td class="td-actions">
                                      <div class="upcoming-actions">
                                          <a href="${consultFormBase}" class="btn btn-upcoming-consult animsition-link" title="Start a new consultation for this child (scheduled follow-up)"><i class="fa fa-stethoscope"></i> Consult</a>
                                          <button type="button" class="btn btn-upcoming-prior" data-consult-id="${encodeURIComponent(consultId)}" title="Open the last visit record that set this follow-up">Prior visit</button>
                                      </div>
                                  </td>
                              </tr>
                          `;
                          upcomingTableBody.insertAdjacentHTML('afterbegin', followUpRow);
                          upcomingFollowupsCount++;
                      }
                  });

                  if (pastConsultsCount === 0) {
                      pastTableBody.innerHTML = '<tr><td colspan="5" class="text-center">No past consultation records found for this child.</td></tr>';
                  }

                  if (upcomingFollowupsCount === 0) {
                      upcomingTableBody.innerHTML = '<tr><td colspan="3" class="text-center">No upcoming follow-ups found.</td></tr>';
                  }

              })
              .catch(error => {
                  console.error("Error fetching consultations:", error);
                  pastTableBody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error loading consultation data.</td></tr>';
                  upcomingTableBody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Error loading follow-up data.</td></tr>';
              });
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            setupPrescriptionModal();
            auth.onAuthStateChanged(user => {
                if (!user) {
                    window.location.href = '../login.html';
                    return;
                }
                db.collection('users').doc(user.uid).get()
                    .then(doc => {
                        const userData = doc.data() || {};
                        const role = userData.role;
                        const hasPortalAccess = userData.hasPortalAccess === true;
                        
                        if (role !== 'admin' && role !== 'doctor') {
                            alert('Access Denied. Doctors and Admins only.');
                            window.location.href = '../index.html';
                        } else if (role === 'doctor' && !hasPortalAccess) {
                            alert('You currently have no active consultations. The Doctor Portal will become accessible once a patient books a session with you.');
                            window.location.href = '../index.html';
                        } else {
                            getPatientDetails();
                        }
                    });
            });
        });
    </script>
